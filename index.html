
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>iOS 日历壁纸生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  :root{
    --bg:#b9d886;
    --card:#151515;
    --holiday:#b9d886;
    --text:#ffffff;
    --calendar-row-gap:13.333px;
    --ui-bg:#f5f5f7;
    --ui-card:rgba(255,255,255,.78);
    --ui-line:rgba(0,0,0,.08);
    --ui-text:#1d1d1f;
    --ui-sub:#6e6e73;
    --ui-blue:#007aff;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:Inter, "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    background:
      radial-gradient(circle at 18% 12%, rgba(0,122,255,.16), transparent 28%),
      radial-gradient(circle at 84% 8%, rgba(185,216,134,.22), transparent 25%),
      linear-gradient(180deg,#fbfbfd 0%, var(--ui-bg) 100%);
    color:var(--ui-text);
    display:grid;
    grid-template-columns:390px 1fr;
    min-height:100vh;
  }

  .panel{
    margin:22px;
    padding:22px;
    background:var(--ui-card);
    border:1px solid rgba(255,255,255,.72);
    border-radius:30px;
    box-shadow:0 24px 70px rgba(0,0,0,.10);
    backdrop-filter:blur(22px) saturate(1.25);
    -webkit-backdrop-filter:blur(22px) saturate(1.25);
    position:sticky;
    top:22px;
    height:calc(100vh - 44px);
    overflow:auto;
  }

  h1{
    font-size:24px;
    margin:0 0 20px;
    letter-spacing:-.04em;
    font-weight:700;
  }

  label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin:17px 0 8px;
    color:#2f2f33;
  }

  input,select,button{
    width:100%;
    height:44px;
    border:1px solid var(--ui-line);
    border-radius:15px;
    padding:0 13px;
    font-size:14px;
    background:rgba(255,255,255,.72);
    color:var(--ui-text);
    outline:none;
    transition:.18s ease;
  }

  input:focus,select:focus{
    border-color:rgba(0,122,255,.45);
    box-shadow:0 0 0 4px rgba(0,122,255,.12);
    background:#fff;
  }

  input[type=color]{
    padding:5px;
    cursor:pointer;
  }
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{
    border:0;
    border-radius:11px;
  }

  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .control-row{display:grid;grid-template-columns:1fr 112px;gap:10px;align-items:center}
  .control-row input,.control-row button{margin-top:0}
  .inline-btn{height:44px}

  .range-wrap{
    display:grid;
    grid-template-columns:1fr 56px;
    gap:12px;
    align-items:center;
    height:44px;
    padding:0 12px;
    border:1px solid var(--ui-line);
    border-radius:15px;
    background:rgba(255,255,255,.72);
  }
  .range-wrap input{
    height:28px;
    padding:0;
    border:0;
    background:transparent;
    accent-color:var(--ui-blue);
  }
  .range-wrap input:focus{
    box-shadow:none;
    background:transparent;
  }
  .range-wrap span{
    font-size:13px;
    color:var(--ui-sub);
    text-align:right;
    font-variant-numeric:tabular-nums;
  }

  button{
    margin-top:18px;
    border:0;
    background:linear-gradient(180deg,#1487ff 0%,#007aff 100%);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(0,122,255,.28);
  }

  button.secondary{
    background:rgba(118,118,128,.12);
    color:var(--ui-blue);
    box-shadow:none;
    font-weight:600;
  }

  #download{
    color:#fff;
    height:48px;
    border-radius:17px;
    margin-top:24px;
  }

  .tip{
    font-size:12px;
    color:var(--ui-sub);
    line-height:1.65;
    margin-top:16px;
    padding:14px 15px;
    background:rgba(118,118,128,.09);
    border-radius:18px;
  }

  .stage{
    padding:34px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overflow:auto;
  }

  #wallpaper{
    width:402px;
    height:970px;
    background:var(--bg);
    position:relative;
    overflow:hidden;
    transform-origin:top center;
    border-radius:34px;
    box-shadow:
      0 34px 90px rgba(0,0,0,.22),
      0 0 0 1px rgba(255,255,255,.36);
  }

  .calendar-card{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:587.333px; /* 导出后为 1762px */
    background:var(--card);
    border-radius:72px 72px 0 0;
    padding:33.333px 51px 0; /* 顶部导出后为 100px */
    color:var(--text);
  }

  .header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    margin-bottom:20px; /* 导出后为 60px */
    white-space:nowrap;
  }

  .zh-month{
    color:var(--holiday);
    font-size:19px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:12px;
  }

  .zh-month::before{
    content:"";
    width:3px;
    height:21px;
    background:var(--holiday);
    display:inline-block;
  }

  .en-month{
    font-size:30px;
    line-height:1;
    font-weight:700;
    letter-spacing:1px;
    color:var(--text);
  }

  .wish{
    color:var(--holiday);
    font-size:15px;
    line-height:1.12;
    font-weight:700;
    letter-spacing:2px;
  }

  .week{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:17.667px; /* 导出后为 53px */
    text-align:center;
    font-size:18px;
    font-weight:600;
  }

  .week .weekend{color:var(--holiday)}

  .days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    row-gap:var(--calendar-row-gap);
    text-align:center;
  }

  .day{
    min-height:36px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
  }

  .date{
    font-size:18px;
    line-height:1;
    font-weight:500;
    color:var(--text);
  }

  .lunar{
    margin-top:5px;
    font-size:10px;
    line-height:1.15;
    color:var(--text);
    white-space:pre-line;
    font-weight:400;
  }

  .holiday .date,.holiday .lunar{color:var(--holiday)}
  .empty{min-height:36px}
  .mobile-bar{display:none;}

  @media(max-width:900px){
    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#fff;
    }

    body{
      display:block;
      min-height:100svh;
    }

    .stage{
      position:fixed;
      inset:0;
      width:100vw;
      height:100svh;
      padding:0 0 calc(112px + env(safe-area-inset-bottom));
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#fff;
      z-index:1;
    }

    #wallpaper{
      width:402px;
      height:970px;
      border-radius:72px;
      box-shadow:0 28px 80px rgba(0,0,0,.10);
      transform:translateY(-5svh) scale(.70);
      transform-origin:center center;
      transition:transform .34s cubic-bezier(.2,.8,.2,1), box-shadow .34s cubic-bezier(.2,.8,.2,1);
      z-index:2;
    }

    .calendar-card{
      border-radius:72px 72px 0 0;
    }

    .panel{
      position:fixed !important;
      left:8px !important;
      right:8px !important;
      bottom:0 !important;
      top:auto !important;
      width:auto !important;
      height:58svh !important;
      margin:0 !important;
      padding:22px 18px calc(118px + env(safe-area-inset-bottom)) !important;
      border-radius:32px 32px 0 0 !important;
      z-index:30 !important;
      transform:translateY(100%);
      transition:transform .34s cubic-bezier(.2,.8,.2,1);
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      background:rgba(248,248,252,.94);
      border:1px solid rgba(255,255,255,.9);
      box-shadow:0 -22px 80px rgba(0,0,0,.18);
      backdrop-filter:blur(24px) saturate(1.25);
      -webkit-backdrop-filter:blur(24px) saturate(1.25);
    }

    .panel::before{
      content:"";
      display:block;
      width:46px;
      height:5px;
      border-radius:999px;
      background:rgba(60,60,67,.24);
      margin:0 auto 18px;
    }

    .panel h1{
      font-size:28px;
      line-height:1.12;
      letter-spacing:-.052em;
      margin:0 0 22px;
    }

    .panel label{
      margin-top:18px;
    }

    .panel #download{
      display:none !important;
    }

    body.panel-open .panel{
      transform:translateY(0);
    }

    body.panel-open #wallpaper{
      transform:translateY(-25svh) scale(.42);
      box-shadow:0 20px 60px rgba(0,0,0,.10);
    }

    .row{
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
  }

  @media(max-width:900px){
    .mobile-bar{
      display:flex;
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      padding:12px 18px calc(12px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.92);
      border-top-left-radius:28px;
      border-top-right-radius:28px;
      box-shadow:0 -16px 46px rgba(0,0,0,.14);
      backdrop-filter:blur(22px) saturate(1.25);
      -webkit-backdrop-filter:blur(22px) saturate(1.25);
      gap:14px;
      z-index:9999;
    }

    .mobile-bar #mobileDownloadBtn{
      flex:1;
      height:56px;
      margin:0;
      border:0;
      border-radius:16px;
      background:linear-gradient(180deg,#4f73ff 0%,#3156ff 100%);
      color:#fff;
      font-size:17px;
      font-weight:700;
      letter-spacing:.01em;
      box-shadow:none;
    }

    .mobile-toggle{
      width:102px;
      height:56px;
      margin:0;
      border:0;
      border-radius:16px;
      background:transparent;
      color:#111;
      box-shadow:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:17px;
      font-weight:700;
      padding:0;
    }

    .mobile-arrow{
      width:12px;
      height:12px;
      border-right:2.5px solid #111;
      border-bottom:2.5px solid #111;
      border-radius:1px;
      transform:translateY(2px) rotate(225deg);
      transition:transform .28s cubic-bezier(.2,.8,.2,1);
    }

    body.panel-open .mobile-arrow{
      transform:translateY(-2px) rotate(45deg);
    }

    body.panel-open .mobile-toggle #toggleText::before{
      content:"收起";
      font-size:17px;
    }

    body.panel-open .mobile-toggle #toggleText{
      font-size:0;
    }

    body.panel-open #wallpaper{
      transform:translateY(-25svh) scale(.42);
      box-shadow:0 20px 60px rgba(0,0,0,.10);
    }
  }


  @media(max-width:900px){
    .mobile-backdrop{
      display:none;
      position:fixed;
      inset:0;
      z-index:20;
      background:rgba(255,255,255,0);
    }

    body.panel-open .mobile-backdrop{
      display:block;
    }

    body.panel-open .panel{
      transform:translateY(0);
    }
  }

</style>
</head>

<body>
  <aside class="panel">
    <h1>iOS 日历壁纸生成器</h1>

    <div class="row">
      <div>
        <label>年份</label>
        <input id="year" type="number" min="1901" max="2100" value="2026">
      </div>
      <div>
        <label>月份</label>
        <select id="month"></select>
      </div>
    </div>

    <label style="display:flex;align-items:center;gap:8px;font-weight:700;">
      <input id="mondayStart" type="checkbox" style="width:18px;height:18px;margin:0;">
      星期一作为每周第一天
    </label>

    <label>日历行间距</label>
    <div class="range-wrap">
      <input id="rowGap" type="range" min="20" max="70" step="1" value="40">
      <span id="rowGapValue">40px</span>
    </div>

    <label>祝福语</label>
    <input id="wish" maxlength="4" value="富贵吉祥">

    <label>1. 背景颜色</label>
    <input id="bgColor" type="color" value="#b9d886">

    <label>2. 日历背景颜色</label>
    <input id="cardColor" type="color" value="#151515">

    <label>3. 节假日期颜色</label>
    <div class="control-row">
      <input id="holidayColor" type="color" value="#b9d886">
      <button id="syncHoliday" class="secondary inline-btn" type="button">自动调节</button>
    </div>

    <label>4. 普通日期颜色</label>
    <div class="control-row">
      <input id="textColor" type="color" value="#ffffff">
      <button id="autoText" class="secondary inline-btn" type="button">自动调节</button>
    </div>

    <button id="download" type="button">下载壁纸</button>

    <p class="tip">
      默认画布：1206 × 2910 px。打开时自动显示当前月份，并随机生成一组配色。手机端点击下载后会打开图片，长按即可保存到相册。
    </p>
  </aside>

  <main class="stage">
<div id="wallpaper">
      <section class="calendar-card">
        <div class="header">
          <div class="zh-month" id="zhMonth">五月</div>
          <div class="en-month" id="enMonth">MAY</div>
          <div class="wish" id="wishShow">富贵<br>吉祥</div>
        </div>
        <div class="week" id="weekRow"></div>
        <div class="days" id="days"></div>
      </section>
    </div>
      <div id="mobileBackdrop" class="mobile-backdrop"></div>

    <div class="mobile-bar">
      <button id="mobileDownloadBtn" type="button">下载壁纸</button>
      <button id="togglePanel" class="mobile-toggle" type="button">
        <span id="toggleText">设置</span>
        <span class="mobile-arrow"></span>
      </button>
    </div>
  </main>

<script>
const $ = id => document.getElementById(id);

const cnMonths = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const enMonths = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const lunarDays = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
const lunarMonths = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];

for(let i=1;i<=12;i++){
  const opt=document.createElement("option");
  opt.value=i;
  opt.textContent=i+"月";
  // 默认月份由当前日期自动设置
  $("month").appendChild(opt);
}

function luminance(hex){
  const c = hex.replace("#","");
  const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255;
}

function autoTextColor(){
  $("textColor").value = luminance($("cardColor").value) < 0.55 ? "#ffffff" : "#111111";
}

function formatWish(s){
  const v = (s || "富贵吉祥").slice(0,4);
  return v.slice(0,2) + "<br>" + v.slice(2,4);
}

function getLunarParts(date){
  try{
    const parts = new Intl.DateTimeFormat("zh-u-ca-chinese", {month:"long", day:"numeric"}).formatToParts(date);
    const mText = (parts.find(p=>p.type==="month")||{}).value || "";
    const dText = (parts.find(p=>p.type==="day")||{}).value || "";
    let m = lunarMonths.findIndex(x=>mText.includes(x.replace("月",""))) + 1;
    let d = parseInt(dText,10);
    if(!m || !d) return null;
    return {m,d};
  }catch(e){
    return null;
  }
}

function lunarText(date){
  const p = getLunarParts(date);
  if(!p) return "";
  if(p.d === 1) return lunarMonths[p.m-1];
  return lunarDays[p.d-1] || "";
}

function holidayName(date){
  const m=date.getMonth()+1, d=date.getDate();
  const solar = {
    "1-1":"元旦","2-14":"情人节","3-8":"妇女节","4-4":"清明","4-5":"清明",
    "5-1":"劳动节","5-4":"青年节","6-1":"儿童节","7-1":"建党节",
    "8-1":"建军节","9-10":"教师节","10-1":"国庆节","12-25":"圣诞节"
  };
  if(solar[`${m}-${d}`]) return solar[`${m}-${d}`];

  const lp = getLunarParts(date);
  if(lp){
    const lunar = {
      "1-1":"春节","1-15":"元宵","5-5":"端午","7-7":"七夕",
      "8-15":"中秋","9-9":"重阳","12-8":"腊八","12-23":"小年"
    };
    if(lunar[`${lp.m}-${lp.d}`]) return lunar[`${lp.m}-${lp.d}`];
  }

  const day = date.getDay();
  const weekIndex = Math.ceil(d/7);
  if(m===5 && day===0 && weekIndex===2) return "母亲节";
  if(m===6 && day===0 && weekIndex===3) return "父亲节";
  if(m===11 && day===4 && d>=22 && d<=28) return "感恩节";
  return "";
}

function render(){
  const year = +$("year").value;
  const month = +$("month").value;
  const rowGapExport = +$("rowGap").value;

  $("rowGapValue").textContent = rowGapExport + "px";
  document.documentElement.style.setProperty("--calendar-row-gap", (rowGapExport / 3) + "px");

  document.documentElement.style.setProperty("--bg", $("bgColor").value);
  document.documentElement.style.setProperty("--card", $("cardColor").value);
  document.documentElement.style.setProperty("--holiday", $("holidayColor").value);
  document.documentElement.style.setProperty("--text", $("textColor").value);

  $("zhMonth").textContent = cnMonths[month-1];
  $("enMonth").textContent = enMonths[month-1];
  $("wishShow").innerHTML = formatWish($("wish").value);

  const days = $("days");
  days.innerHTML = "";

  const first = new Date(year, month-1, 1);
  const count = new Date(year, month, 0).getDate();
  const mondayStart = $("mondayStart").checked;

  const weekLabels = mondayStart ? ["M","T","W","T","F","S","S"] : ["S","M","T","W","T","F","S"];
  $("weekRow").innerHTML = weekLabels.map((w,i)=>{
    const weekend = mondayStart ? (i>=5) : (i===0 || i===6);
    return `<span class="${weekend ? "weekend" : ""}">${w}</span>`;
  }).join("");

  const blankCount = mondayStart ? ((first.getDay() + 6) % 7) : first.getDay();

  for(let i=0;i<blankCount;i++){
    const e = document.createElement("div");
    e.className = "empty";
    days.appendChild(e);
  }

  for(let d=1; d<=count; d++){
    const date = new Date(year, month-1, d);
    const h = holidayName(date);
    const div = document.createElement("div");
    const isWeekend = date.getDay()===0 || date.getDay()===6;
    div.className = "day" + ((h || isWeekend) ? " holiday" : "");
    div.innerHTML = `<div class="date">${d}</div><div class="lunar">${h ? h : lunarText(date)}</div>`;
    days.appendChild(div);
  }
}


function roundRect(ctx, x, y, w, h, r){
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function topRoundRect(ctx, x, y, w, h, r){
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function drawCenteredText(ctx, text, x, y, font, color, baseline = "alphabetic"){
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = "center";
  ctx.textBaseline = baseline;
  ctx.fillText(text, x, y);
}

function drawWallpaperCanvas(){
  const exportScale = 3;
  const W = 1206;
  const H = 2910;

  const bg = $("bgColor").value;
  const card = $("cardColor").value;
  const holiday = $("holidayColor").value;
  const text = $("textColor").value;

  const year = +$("year").value;
  const month = +$("month").value;
  const mondayStart = $("mondayStart").checked;
  const rowGap = +$("rowGap").value;

  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const cardH = 1762;
  const cardY = H - cardH;
  const cardRadius = 216;

  ctx.fillStyle = card;
  topRoundRect(ctx, 0, cardY, W, cardH, cardRadius);
  ctx.fill();

  const centerX = W / 2;

  // Header baseline positions.
  const headerTop = cardY + 100;
  const headerCenterY = headerTop + 44;

  // Chinese month left part.
  const zhX = centerX - 245;
  ctx.fillStyle = holiday;
  roundRect(ctx, zhX - 36, headerCenterY - 31, 9, 66, 3);
  ctx.fill();

  ctx.font = '600 56px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillStyle = holiday;
  ctx.fillText(cnMonths[month - 1], zhX, headerCenterY);

  // English month.
  ctx.font = '700 88px Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif';
  ctx.textAlign = "center";
  ctx.fillStyle = text;
  ctx.fillText(enMonths[month - 1], centerX + 20, headerCenterY + 1);

  // Blessing text, two rows.
  const wish = ($("wish").value || "富贵吉祥").slice(0,4);
  ctx.font = '700 42px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = "center";
  ctx.fillStyle = holiday;
  ctx.fillText(wish.slice(0,2), centerX + 255, headerCenterY - 24);
  ctx.fillText(wish.slice(2,4), centerX + 255, headerCenterY + 27);

  // Week row.
  const contentX = 153;
  const contentW = 900;
  const colW = contentW / 7;
  const weekY = headerTop + 154;
  const weekLabels = mondayStart ? ["M","T","W","T","F","S","S"] : ["S","M","T","W","T","F","S"];

  ctx.font = '600 52px Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif';
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for(let i=0;i<7;i++){
    const isWeekendCol = mondayStart ? i >= 5 : (i === 0 || i === 6);
    ctx.fillStyle = isWeekendCol ? holiday : text;
    ctx.fillText(weekLabels[i], contentX + colW * i + colW / 2, weekY);
  }

  // Dates.
  const first = new Date(year, month - 1, 1);
  const count = new Date(year, month, 0).getDate();
  const blankCount = mondayStart ? ((first.getDay() + 6) % 7) : first.getDay();

  const dateStartY = weekY + 104; // roughly 53px gap + date visual start
  const rowStep = 96 + rowGap;    // date block height + user row gap

  for(let d=1; d<=count; d++){
    const index = blankCount + d - 1;
    const col = index % 7;
    const row = Math.floor(index / 7);
    const x = contentX + colW * col + colW / 2;
    const y = dateStartY + row * rowStep;

    const dateObj = new Date(year, month - 1, d);
    const h = holidayName(dateObj);
    const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
    const color = (h || isWeekend) ? holiday : text;

    ctx.fillStyle = color;
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";

    ctx.font = '500 58px Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif';
    ctx.fillText(String(d), x, y);

    ctx.font = '400 32px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif';
    const sub = h ? h : lunarText(dateObj);
    if(sub){
      // Support 2-line labels like 母亲节 if needed.
      if(sub.length > 3){
        ctx.fillText(sub.slice(0,2), x, y + 42);
        ctx.fillText(sub.slice(2), x, y + 78);
      }else{
        ctx.fillText(sub, x, y + 42);
      }
    }
  }

  return canvas;
}

async function downloadWallpaper(preOpenedWindow = null){
  const out = drawWallpaperCanvas();
  const fileName = `iOS-calendar-wallpaper-${$("year").value}-${$("month").value}.png`;
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if(isMobile){
    out.toBlob((blob) => {
      if(!blob){
        alert("图片生成失败，请再试一次。");
        return;
      }

      const blobUrl = URL.createObjectURL(blob);
      const win = preOpenedWindow || window.open("", "_blank");

      if(win){
        win.location.href = blobUrl;
      }else{
        window.location.href = blobUrl;
      }

      setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
    }, "image/png");
  }else{
    const a = document.createElement("a");
    a.download = fileName;
    a.href = out.toDataURL("image/png");
    a.click();
  }
}

function init(){
  ["year","month","wish","bgColor","cardColor","holidayColor","textColor","mondayStart","rowGap"].forEach(id => {
    $(id).addEventListener("input", render);
  });

  $("autoText").addEventListener("click", () => {
    autoTextColor();
    render();
  });

  $("syncHoliday").addEventListener("click", () => {
    $("holidayColor").value = $("bgColor").value;
    render();
  });

  $("cardColor").addEventListener("input", () => {
    autoTextColor();
    render();
  });

  $("bgColor").addEventListener("input", () => {
    $("holidayColor").value = $("bgColor").value;
    render();
  });

  $("download").addEventListener("click", () => {
    downloadWallpaper();
  });

  $("mobileDownloadBtn").addEventListener("click", (e) => {
    e.preventDefault();
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const preOpenedWindow = isMobile ? window.open("", "_blank") : null;
    if(preOpenedWindow){
      preOpenedWindow.document.write("<p style='font-family:-apple-system;padding:24px;'>正在生成原始 PNG 图片，打开后长按图片保存。</p>");
    }
    downloadWallpaper(preOpenedWindow);
  });

  $("togglePanel").addEventListener("click", (e) => {
    e.preventDefault();
    document.body.classList.toggle("panel-open");
  });

  const mobileBackdrop = $("mobileBackdrop");
  if(mobileBackdrop){
    mobileBackdrop.addEventListener("click", () => {
      document.body.classList.remove("panel-open");
    });
  }

  let panelDragStartY = 0;
  const panelEl = document.querySelector(".panel");
  if(panelEl){
    panelEl.addEventListener("touchstart", (e) => {
      if(e.touches && e.touches.length){
        panelDragStartY = e.touches[0].clientY;
      }
    }, {passive:true});

    panelEl.addEventListener("touchend", (e) => {
      if(!e.changedTouches || !e.changedTouches.length) return;
      const endY = e.changedTouches[0].clientY;
      if(endY - panelDragStartY > 55){
        document.body.classList.remove("panel-open");
      }
    }, {passive:true});
  }

  let startY = 0;
  document.addEventListener("touchstart", (e) => {
    if(e.touches && e.touches.length){
      startY = e.touches[0].clientY;
    }
  }, {passive:true});

  document.addEventListener("touchend", (e) => {
    if(!e.changedTouches || !e.changedTouches.length) return;
    const endY = e.changedTouches[0].clientY;
    const deltaY = endY - startY;
    if(deltaY < -45) document.body.classList.add("panel-open");
    if(deltaY > 45) document.body.classList.remove("panel-open");
  }, {passive:true});


  const palettes = [
    { bg:"#b9d886", card:"#151515" },
    { bg:"#d9c7ff", card:"#17151f" },
    { bg:"#f6c7b6", card:"#191514" },
    { bg:"#b8d8ff", card:"#101722" },
    { bg:"#f2d46f", card:"#19160d" },
    { bg:"#c7ead7", card:"#102018" },
    { bg:"#f4c6d7", card:"#20131a" },
    { bg:"#c9d1ff", card:"#121522" },
    { bg:"#e7e0d1", card:"#181713" },
    { bg:"#bfe3df", card:"#0f1b1a" }
  ];

  const today = new Date();
  $("year").value = today.getFullYear();
  $("month").value = today.getMonth() + 1;

  const picked = palettes[Math.floor(Math.random() * palettes.length)];
  $("bgColor").value = picked.bg;
  $("cardColor").value = picked.card;
  $("holidayColor").value = picked.bg;

  autoTextColor();
  render();
}

init();
</script>
