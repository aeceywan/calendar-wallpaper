




<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>日历壁纸生成器</title>
<link rel="icon" href="./favicon.ico">
<style>
  :root{--ui-bg:#f5f5f7;--ui-card:rgba(255,255,255,.78);--ui-line:rgba(0,0,0,.08);--ui-text:#1d1d1f;--ui-sub:#6e6e73;--ui-blue:#007aff}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ui-text)}
  body{background:radial-gradient(circle at 18% 12%,rgba(0,122,255,.16),transparent 28%),radial-gradient(circle at 84% 8%,rgba(185,216,134,.22),transparent 25%),linear-gradient(180deg,#fbfbfd 0%,var(--ui-bg) 100%);display:grid;grid-template-columns:390px 1fr;min-height:100vh}
  .panel{margin:22px;padding:22px;background:var(--ui-card);border:1px solid rgba(255,255,255,.72);border-radius:30px;box-shadow:0 24px 70px rgba(0,0,0,.10);backdrop-filter:blur(22px) saturate(1.25);-webkit-backdrop-filter:blur(22px) saturate(1.25);position:sticky;top:22px;height:calc(100vh - 44px);overflow:auto}
  h1{font-size:24px;margin:0 0 20px;letter-spacing:-.04em;font-weight:700}
  label{display:block;font-size:13px;font-weight:600;margin:17px 0 8px;color:#2f2f33}
  input,select,button{width:100%;height:44px;border:1px solid var(--ui-line);border-radius:15px;padding:0 13px;font-size:14px;background:rgba(255,255,255,.72);color:var(--ui-text);outline:none}
  select{-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,#333 50%),linear-gradient(135deg,#333 50%,transparent 50%);background-position:calc(100% - 18px) 18px,calc(100% - 12px) 18px;background-size:6px 6px,6px 6px;background-repeat:no-repeat}
  input[type=color]{padding:5px;cursor:pointer} input[type=color]::-webkit-color-swatch-wrapper{padding:0} input[type=color]::-webkit-color-swatch{border:0;border-radius:11px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.control-row{display:grid;grid-template-columns:1fr 112px;gap:10px;align-items:center}.control-row input,.control-row button{margin-top:0}
  .range-wrap{display:grid;grid-template-columns:1fr 56px;gap:12px;align-items:center;height:44px;padding:0 12px;border:1px solid var(--ui-line);border-radius:15px;background:rgba(255,255,255,.72)}
  .range-wrap input{height:28px;padding:0;border:0;background:transparent;accent-color:var(--ui-blue)}.range-wrap span{font-size:13px;color:var(--ui-sub);text-align:right;font-variant-numeric:tabular-nums}
  button{margin-top:18px;border:0;background:linear-gradient(180deg,#1487ff 0%,#007aff 100%);color:#fff;font-weight:600;cursor:pointer;box-shadow:0 10px 24px rgba(0,122,255,.28)}
  button.secondary{background:rgba(118,118,128,.12);color:var(--ui-blue);box-shadow:none;font-weight:600}
  .panel-download-btn{display:none}.tip{font-size:12px;color:var(--ui-sub);line-height:1.65;margin-top:16px;padding:14px 15px;background:rgba(118,118,128,.09);border-radius:18px}
  .stage{position:relative;padding:34px;display:flex;justify-content:center;align-items:flex-start;overflow:auto}
  .canvas-wrap{position:relative;width:402px;height:970px;border-radius:34px;overflow:hidden;box-shadow:0 34px 90px rgba(0,0,0,.22),0 0 0 1px rgba(255,255,255,.36);background:#ddd}
  #previewCanvas{width:100%;height:100%;display:block}
  .random-color-btn{position:absolute;top:34px;right:34px;width:44px;height:44px;border:0;border-radius:999px;padding:0;margin:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.76);color:#111;box-shadow:0 8px 24px rgba(0,0,0,.10);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);z-index:10}
  .random-color-btn svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}

  .mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:-4px 0 20px;padding:5px;border-radius:18px;background:rgba(118,118,128,.12)}
  .mode-tab{height:42px;margin:0;border:0;border-radius:14px;background:transparent;color:var(--ui-sub);font-size:14px;font-weight:700;box-shadow:none}
  .mode-tab.active{background:rgba(255,255,255,.86);color:var(--ui-text);box-shadow:0 6px 18px rgba(0,0,0,.08)}
  .settings-group{display:block}
  .settings-group.hidden{display:none}


  .edge-color-modal{display:none;position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.42);align-items:center;justify-content:center;padding:22px}
  .edge-color-card{width:min(390px,calc(100vw - 44px));background:rgba(255,255,255,.96);border-radius:28px;padding:22px;box-shadow:0 24px 80px rgba(0,0,0,.26);backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2)}
  .edge-color-title{font-size:22px;font-weight:800;margin:0 0 16px;letter-spacing:-.04em}
  .edge-color-preview{height:74px;border-radius:20px;border:1px solid rgba(0,0,0,.08);box-shadow:inset 0 0 0 1px rgba(255,255,255,.45);margin-bottom:16px}
  .edge-color-label{font-size:13px;font-weight:700;color:#3a3a3c;margin:14px 0 8px}
  .edge-color-hex-row{display:grid;grid-template-columns:1fr 92px;gap:10px;align-items:center}
  .edge-color-hex{height:46px;border:1px solid rgba(0,0,0,.12);border-radius:16px;padding:0 14px;font-size:17px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;background:#fff;color:#111}
  .edge-color-apply-small{height:46px;margin:0;border-radius:16px;box-shadow:none;font-size:15px}
  .edge-color-presets{display:grid;grid-template-columns:repeat(8,1fr);gap:9px;margin-top:8px}
  .edge-color-swatch{width:100%;aspect-ratio:1;border-radius:999px;border:2px solid rgba(255,255,255,.9);box-shadow:0 0 0 1px rgba(0,0,0,.10),0 5px 12px rgba(0,0,0,.10);cursor:pointer}
  .edge-color-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  .edge-color-actions button{height:48px;margin:0;border-radius:16px;font-size:16px}
  .edge-color-cancel{background:rgba(118,118,128,.12);color:#007aff;box-shadow:none}
  .edge-color-error{display:none;color:#ff3b30;font-size:12px;margin-top:8px}
  body.edge-color-open{overflow:hidden}

  .mobile-bar,.mobile-backdrop{display:none}
  @media(max-width:900px){
    html,body{width:100%;height:100%;overflow:hidden;background:#fff} body{display:block;min-height:100dvh}
    .stage{position:fixed;inset:0;width:100vw;height:100dvh;padding:0 0 calc(112px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff;z-index:1}
    .canvas-wrap{width:402px;height:970px;border-radius:72px;box-shadow:0 28px 80px rgba(0,0,0,.10);transform:translateY(-5dvh) scale(.70);transform-origin:center center;transition:transform .34s cubic-bezier(.2,.8,.2,1),box-shadow .34s cubic-bezier(.2,.8,.2,1);z-index:2}
    .panel{position:fixed!important;left:8px!important;right:8px!important;bottom:0!important;top:auto!important;width:auto!important;height:58dvh!important;margin:0!important;padding:22px 18px calc(118px + env(safe-area-inset-bottom))!important;border-radius:32px 32px 0 0!important;z-index:30!important;transform:translateY(100%);transition:transform .34s cubic-bezier(.2,.8,.2,1);overflow:auto;-webkit-overflow-scrolling:touch;background:rgba(248,248,252,.94);border:1px solid rgba(255,255,255,.9);box-shadow:0 -22px 80px rgba(0,0,0,.18);backdrop-filter:blur(24px) saturate(1.25);-webkit-backdrop-filter:blur(24px) saturate(1.25)}
    .panel::before{content:"";display:block;width:46px;height:5px;border-radius:999px;background:rgba(60,60,67,.24);margin:0 auto 18px}
    .panel h1{font-size:28px;line-height:1.12;letter-spacing:-.052em;margin:0 0 22px}.panel label{margin-top:18px}.panel #download,.panel #homeDownload{display:none!important}
    .panel-download-btn{display:block;width:100%;height:56px;margin-top:24px;margin-bottom:8px;border:0;border-radius:18px;background:linear-gradient(180deg,#4f73ff 0%,#3156ff 100%);color:#fff;font-size:17px;font-weight:700;box-shadow:0 12px 30px rgba(0,85,255,.25)}
    .mobile-backdrop{display:none;position:fixed;left:0;right:0;top:0;height:42dvh;z-index:20;background:rgba(255,255,255,0);pointer-events:none}
    body.panel-open .mobile-backdrop{display:block;pointer-events:auto} body.panel-open .panel{transform:translateY(0)} body.panel-open .canvas-wrap{transform:translateY(-25dvh) scale(.42);box-shadow:0 20px 60px rgba(0,0,0,.10)}
    .mobile-bar{display:flex;position:fixed;left:0;right:0;bottom:0;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:rgba(255,255,255,.92);border-top-left-radius:28px;border-top-right-radius:28px;box-shadow:0 -16px 46px rgba(0,0,0,.14);backdrop-filter:blur(22px) saturate(1.25);-webkit-backdrop-filter:blur(22px) saturate(1.25);gap:14px;z-index:9999}
    .mobile-bar #mobileDownloadBtn{flex:1;height:56px;margin:0;border:0;border-radius:16px;background:linear-gradient(180deg,#4f73ff 0%,#3156ff 100%);color:#fff;font-size:17px;font-weight:700;letter-spacing:.01em;box-shadow:none}
    .mobile-toggle{width:102px;height:56px;margin:0;border:0;border-radius:16px;background:transparent;color:#111;box-shadow:none;display:flex;align-items:center;justify-content:center;gap:8px;font-size:17px;font-weight:700;padding:0}
    .mobile-arrow{width:12px;height:12px;border-right:2.5px solid #111;border-bottom:2.5px solid #111;border-radius:1px;transform:translateY(2px) rotate(225deg);transition:transform .28s cubic-bezier(.2,.8,.2,1)}
    body.panel-open .mobile-arrow{transform:translateY(-2px) rotate(45deg)} body.panel-open .mobile-toggle #toggleText::before{content:"收起";font-size:17px} body.panel-open .mobile-toggle #toggleText{font-size:0}
    .random-color-btn{position:fixed;top:18px;right:18px;width:46px;height:46px;z-index:50} body.panel-open .random-color-btn{top:14px;right:14px;transform:scale(.92)}
    select#year,select#month{font-size:16px;font-weight:600;text-align:center;text-align-last:center}
  }
</style>

<body>
  <aside class="panel">
    <h1>日历壁纸生成器</h1>
    <div class="mode-tabs">
      <button id="lockTab" class="mode-tab active" type="button">锁定屏幕</button>
      <button id="homeTab" class="mode-tab" type="button">手机墙纸</button>
    </div>

    <div id="lockSettings" class="settings-group">
      <div class="row"><div><label>年份</label><select id="year"></select></div><div><label>月份</label><select id="month"></select></div></div>
      <label style="display:flex;align-items:center;gap:8px;font-weight:700;"><input id="mondayStart" type="checkbox" style="width:18px;height:18px;margin:0;">星期一作为每周第一天</label>
      <label>日历行间距</label><div class="range-wrap"><input id="rowGap" type="range" min="20" max="70" step="1" value="40"><span id="rowGapValue">40px</span></div>
      <label>祝福语</label><input id="wish" maxlength="4" value="富贵吉祥">
      <label>1. 背景颜色</label><input id="bgColor" type="color" value="#b9d886">
      <label>2. 日历背景颜色</label><input id="cardColor" type="color" value="#151515">
      <label>3. 节假日期颜色</label><div class="control-row"><input id="holidayColor" type="color" value="#b9d886"><button id="syncHoliday" class="secondary" type="button">自动调节</button></div>
      <label>4. 普通日期颜色</label><div class="control-row"><input id="textColor" type="color" value="#ffffff"><button id="autoText" class="secondary" type="button">自动调节</button></div>
      <button id="download" type="button">下载壁纸</button><button id="panelDownloadBtn" class="panel-download-btn" type="button">下载壁纸</button>
    </div>

    <div id="homeSettings" class="settings-group hidden">
      <label>背景颜色1</label><input id="homeColor1" type="color" value="#afdb8a">
      <label>背景颜色2</label><input id="homeColor2" type="color" value="#000000">
      <button id="homeDownload" type="button">下载壁纸</button><button id="homePanelDownloadBtn" class="panel-download-btn" type="button">下载壁纸</button>
    </div>

    <p class="tip">稳定版：预览和下载使用同一个 Canvas，不再截图页面，兼容不同手机浏览器。</p>
  </aside>
  <main class="stage">
    <button id="randomColorBtn" class="random-color-btn" type="button" aria-label="随机配色" title="随机配色"><svg viewBox="0 0 48 48" fill="none"><path d="M40 33L44 37L40 41"/><path d="M40 7L44 11L40 15"/><path d="M44 11H37C29.8203 11 24 16.8203 24 24C24 31.1797 29.8203 37 37 37H44"/><path d="M4 37H11C18.1797 37 24 31.1797 24 24C24 16.8203 18.1797 11 11 11H4"/></svg></button>
    <div class="canvas-wrap"><canvas id="previewCanvas" width="1206" height="2910"></canvas></div>
    <div id="mobileBackdrop" class="mobile-backdrop"></div>
    <div class="mobile-bar"><button id="mobileDownloadBtn" type="button">下载壁纸</button><button id="togglePanel" class="mobile-toggle" type="button"><span id="toggleText">设置</span><span class="mobile-arrow"></span></button></div>
  </main>
  <div id="edgeColorModal" class="edge-color-modal" aria-hidden="true">
    <div class="edge-color-card" role="dialog" aria-modal="true" aria-labelledby="edgeColorTitle">
      <h2 id="edgeColorTitle" class="edge-color-title">选择颜色</h2>
      <div id="edgeColorPreview" class="edge-color-preview"></div>
      <div class="edge-color-label">输入颜色值</div>
      <div class="edge-color-hex-row">
        <input id="edgeColorHex" class="edge-color-hex" type="text" value="#00B4D8" maxlength="7" inputmode="text" autocomplete="off">
        <button id="edgeColorApplySmall" class="edge-color-apply-small" type="button">预览</button>
      </div>
      <div id="edgeColorError" class="edge-color-error">请输入正确的颜色值，例如 #00B4D8</div>
      <div class="edge-color-label">常用颜色</div>
      <div id="edgeColorPresets" class="edge-color-presets"></div>
      <div class="edge-color-actions">
        <button id="edgeColorCancel" class="edge-color-cancel" type="button">取消</button>
        <button id="edgeColorConfirm" type="button">确定</button>
      </div>
    </div>
  </div>
<script>
const $=id=>document.getElementById(id);
const cnMonths=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const enMonths=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const lunarDays=["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
const lunarMonths=["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];
for(let y=1901;y<=2100;y++){const opt=document.createElement("option");opt.value=y;opt.textContent=y+"年";$("year").appendChild(opt)}
for(let i=1;i<=12;i++){const opt=document.createElement("option");opt.value=i;opt.textContent=i+"月";$("month").appendChild(opt)}

function luminance(hex){const c=hex.replace("#","");const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);return(0.299*r+0.587*g+0.114*b)/255}
function autoTextColor(){$("textColor").value=luminance($("cardColor").value)<.55?"#ffffff":"#111111"}
function getLunarParts(date){try{const parts=new Intl.DateTimeFormat("zh-u-ca-chinese",{month:"long",day:"numeric"}).formatToParts(date);const mText=(parts.find(p=>p.type==="month")||{}).value||"";const dText=(parts.find(p=>p.type==="day")||{}).value||"";let m=lunarMonths.findIndex(x=>mText.indexOf(x.replace("月",""))!==-1)+1;let d=parseInt(dText,10);if(!m||!d)return null;return{m,d}}catch(e){return null}}
function lunarText(date){const p=getLunarParts(date);if(!p)return"";if(p.d===1)return lunarMonths[p.m-1];return lunarDays[p.d-1]||""}
function holidayName(date){const m=date.getMonth()+1,d=date.getDate();const solar={"1-1":"元旦","2-14":"情人节","3-8":"妇女节","4-4":"清明","4-5":"清明","5-1":"劳动节","5-4":"青年节","6-1":"儿童节","7-1":"建党节","8-1":"建军节","9-10":"教师节","10-1":"国庆节","12-25":"圣诞节"};if(solar[m+"-"+d])return solar[m+"-"+d];const lp=getLunarParts(date);if(lp){const lunar={"1-1":"春节","1-15":"元宵","5-5":"端午","7-7":"七夕","8-15":"中秋","9-9":"重阳","12-8":"腊八","12-23":"小年"};if(lunar[lp.m+"-"+lp.d])return lunar[lp.m+"-"+lp.d]}const day=date.getDay(),weekIndex=Math.ceil(d/7);if(m===5&&day===0&&weekIndex===2)return"母亲节";if(m===6&&day===0&&weekIndex===3)return"父亲节";if(m===11&&day===4&&d>=22&&d<=28)return"感恩节";return""}

function roundRect(ctx,x,y,w,h,r){const radius=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+radius,y);ctx.lineTo(x+w-radius,y);ctx.quadraticCurveTo(x+w,y,x+w,y+radius);ctx.lineTo(x+w,y+h-radius);ctx.quadraticCurveTo(x+w,y+h,x+w-radius,y+h);ctx.lineTo(x+radius,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-radius);ctx.lineTo(x,y+radius);ctx.quadraticCurveTo(x,y,x+radius,y);ctx.closePath()}
function topRoundRect(ctx,x,y,w,h,r){const radius=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+radius,y);ctx.lineTo(x+w-radius,y);ctx.quadraticCurveTo(x+w,y,x+w,y+radius);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+radius);ctx.quadraticCurveTo(x,y,x+radius,y);ctx.closePath()}
function drawText(ctx,text,x,y,font,color,align="center",baseline="middle"){ctx.font=font;ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline=baseline;ctx.fillText(text,x,y)}

function drawWallpaper(ctx){
 const W=1206,H=2910,bg=$("bgColor").value,card=$("cardColor").value,holiday=$("holidayColor").value,text=$("textColor").value;
 const year=+$("year").value,month=+$("month").value,mondayStart=$("mondayStart").checked,rowGap=+$("rowGap").value;
 ctx.clearRect(0,0,W,H);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
 const cardH=1762,cardY=H-cardH,cardRadius=216;ctx.fillStyle=card;topRoundRect(ctx,0,cardY,W,cardH,cardRadius);ctx.fill();
 const centerX=W/2,headerTop=cardY+100,headerCenterY=headerTop+44,zhX=centerX-245;
 ctx.fillStyle=holiday;roundRect(ctx,zhX-36,headerCenterY-31,9,66,3);ctx.fill();
 drawText(ctx,cnMonths[month-1],zhX,headerCenterY,'600 56px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif',holiday,"left","middle");
 drawText(ctx,enMonths[month-1],centerX+20,headerCenterY+1,'700 88px -apple-system,BlinkMacSystemFont,Arial,sans-serif',text);
 const wish=($("wish").value||"富贵吉祥").slice(0,4);
 drawText(ctx,wish.slice(0,2),centerX+255,headerCenterY-24,'700 42px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif',holiday);
 drawText(ctx,wish.slice(2,4),centerX+255,headerCenterY+27,'700 42px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif',holiday);
 const contentX=153,contentW=900,colW=contentW/7,weekY=headerCenterY+170;
 const weekLabels=mondayStart?["M","T","W","T","F","S","S"]:["S","M","T","W","T","F","S"];
 for(let i=0;i<7;i++){const isWeekendCol=mondayStart?i>=5:(i===0||i===6);drawText(ctx,weekLabels[i],contentX+colW*i+colW/2,weekY,'600 46px -apple-system,BlinkMacSystemFont,Arial,sans-serif',isWeekendCol?holiday:text)}
 const first=new Date(year,month-1,1),count=new Date(year,month,0).getDate(),blankCount=mondayStart?((first.getDay()+6)%7):first.getDay();
 const dateStartY=weekY+90,rowStep=108+rowGap;
 for(let d=1;d<=count;d++){
   const index=blankCount+d-1,col=index%7,row=Math.floor(index/7),x=contentX+colW*col+colW/2,dateY=dateStartY+row*rowStep;
   const dateObj=new Date(year,month-1,d),h=holidayName(dateObj),isWeekend=dateObj.getDay()===0||dateObj.getDay()===6,color=(h||isWeekend)?holiday:text;
   drawText(ctx,String(d),x,dateY,'400 52px -apple-system,BlinkMacSystemFont,Arial,sans-serif',color,"center","top");
   const sub=h?h:lunarText(dateObj);if(sub){const lunarY=dateY+69;if(sub.length>3){drawText(ctx,sub.slice(0,2),x,lunarY,'400 28px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif',color,"center","top");drawText(ctx,sub.slice(2),x,lunarY+34,'400 28px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif',color,"center","top")}else{drawText(ctx,sub,x,lunarY,'400 28px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif',color,"center","top")}}
 }
}
let activeMode="lock";
const LOCK_W=1206, LOCK_H=2910, HOME_W=941, HOME_H=2048;

function mixWithWhite(hex,ratio){
 const c=hex.replace("#","");
 const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
 const nr=Math.round(r*(1-ratio)+255*ratio),ng=Math.round(g*(1-ratio)+255*ratio),nb=Math.round(b*(1-ratio)+255*ratio);
 return "#"+[nr,ng,nb].map(v=>v.toString(16).padStart(2,"0")).join("");
}
function bottomRoundRect(ctx,x,y,w,h,r){
 const radius=Math.min(r,w/2,h/2);
 ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.lineTo(x+w,y+h-radius);ctx.quadraticCurveTo(x+w,y+h,x+w-radius,y+h);ctx.lineTo(x+radius,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-radius);ctx.lineTo(x,y);ctx.closePath();
}
function drawHomeWallpaper(ctx){
 const W=HOME_W,H=HOME_H,color1=$("homeColor1").value,color2=$("homeColor2").value,pill=mixWithWhite(color1,.20);
 ctx.clearRect(0,0,W,H);ctx.fillStyle=color2;ctx.fillRect(0,0,W,H);
 const topH=737/874*H, topR=42/402*W;
 ctx.fillStyle=color1;bottomRoundRect(ctx,0,0,W,topH,topR);ctx.fill();
 const pillX=15/402*W,pillY=757/874*H,pillW=372/402*W,pillH=102/874*H,pillR=pillH/2;
 ctx.fillStyle=pill;roundRect(ctx,pillX,pillY,pillW,pillH,pillR);ctx.fill();
}
function setCanvasSizeForMode(){
 const canvas=$("previewCanvas"),wrap=document.querySelector(".canvas-wrap");
 if(activeMode==="home"){canvas.width=HOME_W;canvas.height=HOME_H;wrap.style.height=(402*HOME_H/HOME_W)+"px";}
 else{canvas.width=LOCK_W;canvas.height=LOCK_H;wrap.style.height="970px";}
}
function render(){
 $("rowGapValue").textContent=$("rowGap").value+"px";
 setCanvasSizeForMode();
 const ctx=$("previewCanvas").getContext("2d");
 if(activeMode==="home")drawHomeWallpaper(ctx);else drawWallpaper(ctx);
}
function randomizePalette(){
 if(activeMode==="home"){
   const palettes=[["#afdb8a","#000000"],["#c7ead7","#101915"],["#bde0fe","#05070d"],["#ffafcc","#12070c"],["#d9c7ff","#090712"],["#fee440","#111006"],["#a8dadc","#071112"],["#f4c6d7","#140b10"],["#c9d1ff","#080a12"],["#ffb86b","#120c05"],["#7bdff2","#061114"],["#e9c46a","#151007"]];
   const p=palettes[Math.floor(Math.random()*palettes.length)];
   $("homeColor1").value=p[0];$("homeColor2").value=p[1];render();return;
 }
 const palettes=[{bg:"#b9d886",card:"#151515"},{bg:"#d9c7ff",card:"#17151f"},{bg:"#f6c7b6",card:"#191514"},{bg:"#b8d8ff",card:"#101722"},{bg:"#f2d46f",card:"#19160d"},{bg:"#c7ead7",card:"#102018"},{bg:"#f4c6d7",card:"#20131a"},{bg:"#c9d1ff",card:"#121522"},{bg:"#bfe3df",card:"#0f1b1a"},{bg:"#ffb86b",card:"#17120d"},{bg:"#8be9fd",card:"#101820"},{bg:"#ff7aa2",card:"#201018"},{bg:"#ff6b6b",card:"#fff6f2",holiday:"#d94d4d"},{bg:"#ff9f1c",card:"#fff7e6",holiday:"#c87800"},{bg:"#2ec4b6",card:"#effffc",holiday:"#139888"},{bg:"#3a86ff",card:"#f0f6ff",holiday:"#2368d8"},{bg:"#8338ec",card:"#f7f0ff",holiday:"#6c2bd9"},{bg:"#ff006e",card:"#fff0f6",holiday:"#d6005d"},{bg:"#00b4d8",card:"#eefbff",holiday:"#008fb0"},{bg:"#06d6a0",card:"#effff9",holiday:"#00a77a"},{bg:"#fb5607",card:"#fff1e8",holiday:"#d74700"},{bg:"#7bdff2",card:"#fbfeff",holiday:"#2898ad"},{bg:"#f15bb5",card:"#fff0fa",holiday:"#c93d91"},{bg:"#fee440",card:"#fffce6",holiday:"#b99b00"},{bg:"#9b5de5",card:"#f7f0ff",holiday:"#7442bd"},{bg:"#e76f51",card:"#fff4ef",holiday:"#b94f37"},{bg:"#2a9d8f",card:"#effbf8",holiday:"#197d72"},{bg:"#e9c46a",card:"#fff9e8",holiday:"#b28b23"},{bg:"#f4a261",card:"#fff4e8",holiday:"#c67835"},{bg:"#a8dadc",card:"#fbffff",holiday:"#4b9ea0"},{bg:"#ffafcc",card:"#fff5fa",holiday:"#d96f9c"},{bg:"#bde0fe",card:"#f7fbff",holiday:"#5b9bd8"}];
 const p=palettes[Math.floor(Math.random()*palettes.length)];$("bgColor").value=p.bg;$("cardColor").value=p.card;$("holidayColor").value=p.holiday||p.bg;autoTextColor();render()
}
function saveBlob(blob,filename){const url=URL.createObjectURL(blob),isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);if(isMobile){const win=window.open("","_blank");if(win){win.location.href=url}else{window.location.href=url}}else{const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove()}setTimeout(()=>URL.revokeObjectURL(url),60000)}

function trackEvent(eventName, label){
  if(typeof gtag === "function"){
    gtag("event", eventName, {
      event_category: "wallpaper",
      event_label: label,
      year: $("year") ? $("year").value : "",
      month: $("month") ? $("month").value : ""
    });
  }
}

function downloadWallpaper(){
  if(activeMode==="home"){
    trackEvent("phone_wallpaper_download_click", "phone_wallpaper_download_button");
  }else{
    trackEvent("download_wallpaper_click", "download_button");
  }

  const canvas=$("previewCanvas"),filename=activeMode==="home"?`phone-wallpaper.png`:`calendar-wallpaper-${$("year").value}-${$("month").value}.png`;if(canvas.toBlob){canvas.toBlob(blob=>{if(blob){saveBlob(blob,filename)}else{const a=document.createElement("a");a.href=canvas.toDataURL("image/png");a.download=filename;a.click()}},"image/png")}else{const a=document.createElement("a");a.href=canvas.toDataURL("image/png");a.download=filename;a.click()}}

const isAndroidEdge = /Android/i.test(navigator.userAgent) && /EdgA/i.test(navigator.userAgent);
let edgeColorTarget=null, edgeColorOriginal="";

function normalizeHex(value){
  let v=(value||"").trim();
  if(!v)return null;
  if(v[0]!=="#")v="#"+v;
  if(/^#[0-9A-Fa-f]{3}$/.test(v)){v="#"+v.slice(1).split("").map(ch=>ch+ch).join("");}
  if(/^#[0-9A-Fa-f]{6}$/.test(v))return v.toUpperCase();
  return null;
}
function setEdgePreview(hex){
  $("edgeColorPreview").style.background=hex;
  $("edgeColorHex").value=hex.toUpperCase();
  $("edgeColorError").style.display="none";
}
function applyEdgeColor(){
  const hex=normalizeHex($("edgeColorHex").value);
  if(!hex){$("edgeColorError").style.display="block";return false;}
  setEdgePreview(hex);
  if(edgeColorTarget){
    edgeColorTarget.value=hex;
    edgeColorTarget.dispatchEvent(new Event("input",{bubbles:true}));
    edgeColorTarget.dispatchEvent(new Event("change",{bubbles:true}));
  }
  return true;
}
function openEdgeColorPicker(input){
  edgeColorTarget=input;
  edgeColorOriginal=input.value;
  setEdgePreview(input.value);
  $("edgeColorModal").style.display="flex";
  $("edgeColorModal").setAttribute("aria-hidden","false");
  document.body.classList.add("edge-color-open");
  setTimeout(()=>{$("edgeColorHex").focus();$("edgeColorHex").select()},60);
  trackEvent("edge_color_picker_open","android_edge_color_picker");
}
function closeEdgeColorPicker(keep){
  if(!keep && edgeColorTarget){
    edgeColorTarget.value=edgeColorOriginal;
    edgeColorTarget.dispatchEvent(new Event("input",{bubbles:true}));
    edgeColorTarget.dispatchEvent(new Event("change",{bubbles:true}));
  }
  $("edgeColorModal").style.display="none";
  $("edgeColorModal").setAttribute("aria-hidden","true");
  document.body.classList.remove("edge-color-open");
  edgeColorTarget=null;
}
function initEdgeColorPicker(){
  if(!isAndroidEdge)return;
  const presets=["#000000","#FFFFFF","#151515","#AFDB8A","#B9D886","#00B4D8","#0012B8","#3A86FF","#8338EC","#FF006E","#FFAFCC","#FFB86B","#FEE440","#06D6A0","#2EC4B6","#E76F51"];
  const box=$("edgeColorPresets");
  presets.forEach(hex=>{
    const b=document.createElement("button");
    b.type="button";b.className="edge-color-swatch";b.style.background=hex;b.setAttribute("aria-label",hex);
    b.addEventListener("click",()=>{setEdgePreview(hex);applyEdgeColor()});
    box.appendChild(b);
  });
  document.querySelectorAll('input[type="color"]').forEach(input=>{
    input.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();openEdgeColorPicker(input)});
    input.addEventListener("mousedown",e=>{e.preventDefault()});
    input.addEventListener("touchstart",e=>{e.preventDefault();openEdgeColorPicker(input)},{passive:false});
  });
  $("edgeColorApplySmall").addEventListener("click",applyEdgeColor);
  $("edgeColorHex").addEventListener("input",()=>{
    const hex=normalizeHex($("edgeColorHex").value);
    if(hex){setEdgePreview(hex);if(edgeColorTarget){edgeColorTarget.value=hex;edgeColorTarget.dispatchEvent(new Event("input",{bubbles:true}))}}
  });
  $("edgeColorCancel").addEventListener("click",()=>closeEdgeColorPicker(false));
  $("edgeColorConfirm").addEventListener("click",()=>{if(applyEdgeColor())closeEdgeColorPicker(true)});
  $("edgeColorModal").addEventListener("click",e=>{if(e.target===$("edgeColorModal"))closeEdgeColorPicker(false)});
}

function switchMode(mode){
  activeMode=mode;
  $("lockTab").classList.toggle("active",mode==="lock");
  $("homeTab").classList.toggle("active",mode==="home");
  $("lockSettings").classList.toggle("hidden",mode!=="lock");
  $("homeSettings").classList.toggle("hidden",mode!=="home");
  render();
}
function init(){const today=new Date();$("year").value=today.getFullYear();$("month").value=today.getMonth()+1;["year","month","wish","bgColor","cardColor","holidayColor","textColor","mondayStart","rowGap","homeColor1","homeColor2"].forEach(id=>{$(id).addEventListener("input",render);$(id).addEventListener("change",render)});$("autoText").addEventListener("click",()=>{autoTextColor();render()});$("syncHoliday").addEventListener("click",()=>{$("holidayColor").value=$("bgColor").value;render()});$("cardColor").addEventListener("input",()=>{autoTextColor();render()});$("bgColor").addEventListener("input",()=>{$("holidayColor").value=$("bgColor").value;render()});$("download").addEventListener("click",downloadWallpaper);$("panelDownloadBtn").addEventListener("click",downloadWallpaper);$("homeDownload").addEventListener("click",downloadWallpaper);$("homePanelDownloadBtn").addEventListener("click",downloadWallpaper);$("mobileDownloadBtn").addEventListener("click",downloadWallpaper);$("lockTab").addEventListener("click",()=>switchMode("lock"));$("homeTab").addEventListener("click",()=>switchMode("home"));$("randomColorBtn").addEventListener("click",e=>{
  e.preventDefault();
  trackEvent("random_color_click", activeMode==="home" ? "home_random_button" : "random_button");
  randomizePalette();
});$("togglePanel").addEventListener("click",e=>{
  e.preventDefault();
  trackEvent("setting_panel_click", "setting_button");
  document.body.classList.toggle("panel-open");
});const mobileBackdrop=$("mobileBackdrop");mobileBackdrop.addEventListener("click",()=>{document.body.classList.remove("panel-open")});let backdropStartY=0;mobileBackdrop.addEventListener("touchstart",e=>{if(e.touches&&e.touches.length)backdropStartY=e.touches[0].clientY},{passive:true});mobileBackdrop.addEventListener("touchend",e=>{if(!e.changedTouches||!e.changedTouches.length)return;const endY=e.changedTouches[0].clientY;if(endY-backdropStartY>45)document.body.classList.remove("panel-open")},{passive:true});switchMode("lock");initEdgeColorPicker();randomizePalette()}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()}
</script>
