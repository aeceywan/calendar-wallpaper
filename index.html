<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>iOS 日历壁纸生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#b9d886;
    --card:#151515;
    --holiday:#b9d886;
    --text:#ffffff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Inter, "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    background:#f3f3f3;
    color:#111;
    display:grid;
    grid-template-columns:360px 1fr;
    min-height:100vh;
  }
  .panel{
    padding:24px;
    background:#fff;
    border-right:1px solid #ddd;
    position:sticky;
    top:0;
    height:100vh;
    overflow:auto;
  }
  h1{font-size:22px;margin:0 0 18px}
  label{display:block;font-size:13px;font-weight:400;margin:16px 0 8px}
  input,select,button{
    width:100%;
    height:42px;
    border:1px solid #ccc;
    border-radius:10px;
    padding:0 12px;
    font-size:14px;
    background:#fff;
  }
  input[type=color]{padding:4px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .control-row{display:grid;grid-template-columns:1fr 110px;gap:10px;align-items:center}
  .control-row input,.control-row button{margin-top:0}
  .inline-btn{height:42px}
  button{
    margin-top:18px;
    border:0;
    background:#111;
    color:var(--holiday);
    font-weight:400;
    cursor:pointer;
  }
  button.secondary{background:#eee;color:#111}
  #download{color:#fff;}
  .tip{font-size:12px;color:#666;line-height:1.6;margin-top:14px}
  .stage{
    padding:30px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overflow:auto;
  }
  #wallpaper{
    width:402px;
    height:970px;
    background:var(--bg);
    position:relative;
    overflow:hidden;
    transform-origin:top center;
  }
  .calendar-card{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:587.333px; /* 导出后为 1762px */
    background:var(--card);
    border-radius:72px 72px 0 0;
    padding:33.333px 51px 0; /* 顶部导出后为 100px */
    color:var(--text);
  }
  .header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    margin-bottom:20px; /* 导出后为 60px */
    white-space:nowrap;
  }
  .zh-month{
    color:var(--holiday);
    font-size:19px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .zh-month::before{
    content:"";
    width:3px;
    height:21px;
    background:var(--holiday);
    display:inline-block;
  }
  .en-month{
    font-size:30px;
    line-height:1;
    font-weight:400;
    letter-spacing:1px;
    color:#fff;
  }
  .wish{
    color:var(--holiday);
    font-size:15px;
    line-height:1.12;
    font-weight:400;
    letter-spacing:2px;
  }
  .week{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:17.667px; /* 导出后为 53px */
    text-align:center;
    font-size:18px;
    font-weight:600;
  }
  .week .weekend{color:var(--holiday)}
  .days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    row-gap:13.333px; /* 导出后为 40px */
    text-align:center;
  }
  .day{
    min-height:36px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
  }
  .date{
    font-size:18px;
    line-height:1;
    font-weight:400;
    color:var(--text);
  }
  .lunar{
    margin-top:5px;
    font-size:10px;
    line-height:1.15;
    color:var(--text);
    white-space:pre-line;
    font-weight:400;
  }
  .holiday .date,.holiday .lunar{color:var(--holiday)}
  .empty{min-height:36px}
  @media(max-width:900px){
    body{grid-template-columns:1fr}
    .panel{position:relative;height:auto}
  }
</style>
</head>
<body>
  <aside class="panel">
    <h1>iOS 日历壁纸生成器</h1>

    <div class="row">
      <div>
        <label>年份</label>
        <input id="year" type="number" min="1901" max="2100" value="2026">
      </div>
      <div>
        <label>月份</label>
        <select id="month"></select>
      </div>
    </div>

    <label style="display:flex;align-items:center;gap:8px;font-weight:400;">
      <input id="mondayStart" type="checkbox" style="width:18px;height:18px;margin:0;">
      星期一作为每周第一天
    </label>

    <label>祝福语</label>
    <input id="wish" maxlength="4" value="富贵吉祥">

    <label>1. 背景颜色</label>
    <input id="bgColor" type="color" value="#b9d886">

    <label>2. 日历背景颜色</label>
    <input id="cardColor" type="color" value="#151515">

    <label>3. 节假日期颜色</label>
    <div class="control-row">
      <input id="holidayColor" type="color" value="#b9d886">
      <button id="syncHoliday" class="secondary inline-btn">自动调节</button>
    </div>

    <label>4. 普通日期颜色</label>
    <div class="control-row">
      <input id="textColor" type="color" value="#ffffff">
      <button id="autoText" class="secondary inline-btn">自动调节</button>
    </div>

    <button id="download">下载 PNG 壁纸</button>

    <p class="tip">
      默认画布：1206 × 2910 px。预览为等比缩小，下载时会按原始尺寸导出。阴历使用浏览器 Chinese Calendar 能力生成；常见中国节日已内置。
    </p>
  </aside>

  <main class="stage">
    <div id="wallpaper">
      <section class="calendar-card">
        <div class="header">
          <div class="zh-month" id="zhMonth">五月</div>
          <div class="en-month" id="enMonth">MAY</div>
          <div class="wish" id="wishShow">富贵<br>吉祥</div>
        </div>
        <div class="week" id="weekRow"></div>
        <div class="days" id="days"></div>
      </section>
    </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const cnMonths = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const enMonths = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const lunarDays = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
const lunarMonths = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];

for(let i=1;i<=12;i++){
  const opt=document.createElement("option");
  opt.value=i;
  opt.textContent=i+"月";
  if(i===5) opt.selected=true;
  $("month").appendChild(opt);
}

function luminance(hex){
  const c = hex.replace("#","");
  const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255;
}
function autoTextColor(){
  $("textColor").value = luminance($("cardColor").value) < 0.55 ? "#ffffff" : "#111111";
}
function formatWish(s){
  const v = (s || "富贵吉祥").slice(0,4);
  return v.slice(0,2) + "<br>" + v.slice(2,4);
}
function getLunarParts(date){
  try{
    const parts = new Intl.DateTimeFormat("zh-u-ca-chinese", {month:"long", day:"numeric"}).formatToParts(date);
    const mText = (parts.find(p=>p.type==="month")||{}).value || "";
    const dText = (parts.find(p=>p.type==="day")||{}).value || "";
    let m = lunarMonths.findIndex(x=>mText.includes(x.replace("月",""))) + 1;
    let d = parseInt(dText,10);
    if(!m || !d) return null;
    return {m,d};
  }catch(e){ return null; }
}
function lunarText(date){
  const p = getLunarParts(date);
  if(!p) return "";
  if(p.d === 1) return lunarMonths[p.m-1];
  return lunarDays[p.d-1] || "";
}
function holidayName(date){
  const y=date.getFullYear(), m=date.getMonth()+1, d=date.getDate();
  const solar = {
    "1-1":"元旦","2-14":"情人节","3-8":"妇女节","4-4":"清明","4-5":"清明",
    "5-1":"劳动节","5-4":"青年节","6-1":"儿童节","7-1":"建党节",
    "8-1":"建军节","9-10":"教师节","10-1":"国庆节","12-25":"圣诞节"
  };
  if(solar[`${m}-${d}`]) return solar[`${m}-${d}`];

  const lp = getLunarParts(date);
  if(lp){
    const lunar = {
      "1-1":"春节","1-15":"元宵","5-5":"端午","7-7":"七夕",
      "8-15":"中秋","9-9":"重阳","12-8":"腊八","12-23":"小年"
    };
    if(lunar[`${lp.m}-${lp.d}`]) return lunar[`${lp.m}-${lp.d}`];
  }

  const day = date.getDay();
  const weekIndex = Math.ceil(d/7);
  if(m===5 && day===0 && weekIndex===2) return "母亲节";
  if(m===6 && day===0 && weekIndex===3) return "父亲节";
  if(m===11 && day===4 && d>=22 && d<=28) return "感恩节";
  return "";
}
function render(){
  const year = +$("year").value;
  const month = +$("month").value;
  document.documentElement.style.setProperty("--bg", $("bgColor").value);
  document.documentElement.style.setProperty("--card", $("cardColor").value);
  document.documentElement.style.setProperty("--holiday", $("holidayColor").value);
  document.documentElement.style.setProperty("--text", $("textColor").value);

  $("zhMonth").textContent = cnMonths[month-1];
  $("enMonth").textContent = enMonths[month-1];
  $("wishShow").innerHTML = formatWish($("wish").value);

  const days = $("days");
  days.innerHTML = "";
  const first = new Date(year, month-1, 1);
  const count = new Date(year, month, 0).getDate();
  const mondayStart = $("mondayStart").checked;

  const weekLabels = mondayStart ? ["M","T","W","T","F","S","S"] : ["S","M","T","W","T","F","S"];
  $("weekRow").innerHTML = weekLabels.map((w,i)=>{
    const weekend = mondayStart ? (i>=5) : (i===0 || i===6);
    return `<span class="${weekend ? "weekend" : ""}">${w}</span>`;
  }).join("");

  const blankCount = mondayStart ? ((first.getDay() + 6) % 7) : first.getDay();

  for(let i=0;i<blankCount;i++){
    const e = document.createElement("div");
    e.className = "empty";
    days.appendChild(e);
  }

  for(let d=1; d<=count; d++){
    const date = new Date(year, month-1, d);
    const h = holidayName(date);
    const div = document.createElement("div");
    const isWeekend = date.getDay()===0 || date.getDay()===6;
    div.className = "day" + ((h || isWeekend) ? " holiday" : "");
    div.innerHTML = `<div class="date">${d}</div><div class="lunar">${h ? h : lunarText(date)}</div>`;
    days.appendChild(div);
  }
}
["year","month","wish","bgColor","cardColor","holidayColor","textColor","mondayStart"].forEach(id => $(id).addEventListener("input", render));
$("autoText").onclick = () => { autoTextColor(); render(); };
$("syncHoliday").onclick = () => { $("holidayColor").value = $("bgColor").value; render(); };
$("cardColor").addEventListener("input", () => { autoTextColor(); render(); });
$("bgColor").addEventListener("input", () => { $("holidayColor").value = $("bgColor").value; render(); });

$("download").onclick = async () => {
  const node = $("wallpaper");
  const canvas = await html2canvas(node, {
    backgroundColor:null,
    scale:3,
    width:402,
    height:970,
    useCORS:true
  });
  const out = document.createElement("canvas");
  out.width = 1206;
  out.height = 2910;
  const ctx = out.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(canvas,0,0,1206,2910);
  const a = document.createElement("a");
  a.download = `iOS-calendar-wallpaper-${$("year").value}-${$("month").value}.png`;
  a.href = out.toDataURL("image/png");
  a.click();
};

autoTextColor();
$("holidayColor").value = $("bgColor").value;
render();
</script>
</body>
</html>
